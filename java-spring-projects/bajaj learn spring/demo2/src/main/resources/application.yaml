spring:
  application:
    name: jaiho

  datasource:
    url: jdbc:mysql://localhost:3306/testdb
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

custom:
  made: "007"
  ver: "00009"

app:
  version: 1.1
  author: appauthor
  file:
    uploadDir: /uploads/files
    maxSize: 10MB
    supported:
      languages:
        - java
        - python
        - Go