<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5a67d8;
        }

        .footer {
            margin-top: 15px;
            font-size: 14px;
        }

        .footer a {
            text-decoration: none;
            color: #667eea;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form action="/save" method="post">
        <input name="name" type="text" placeholder="Username" required>
  	      <input name="pass" type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        <p>Don't have an account? <a href="#">Register</a></p>
    </div>
</div>

</body>
</html>
