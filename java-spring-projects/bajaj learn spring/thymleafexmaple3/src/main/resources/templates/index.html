<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Employee List</h2>

<a href="/new">Add Employee</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Image</th> <!-- 🔥 new column -->
        <th>Actions</th>
    </tr>

    <tr th:each="emp : ${listEmployees}">
        <td th:text="${emp.id}"></td>
        <td th:text="${emp.name}"></td>
        <td th:text="${emp.email}"></td>
        <td th:text="${emp.role}"></td>

        <!-- 🔥 IMAGE DISPLAY -->
        <td>
            <img th:src="@{'/image/' + ${emp.id}}" width="100" height="100"/>
        </td>

        <td>
            <a th:href="@{'/edit/' + ${emp.id}}">Edit</a>
            <a th:href="@{'/delete/' + ${emp.id}}">Delete</a>
        </td>
    </tr>

</table>

</body>
</html>
